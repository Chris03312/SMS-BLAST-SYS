# ─────────────────────────────────────────────────────────────────────────────
#  SRMC Platform — Docker Compose (Internet / Demo Mode)
#
#  Same as docker-compose.yml but sets up NGROK_AUTHTOKEN so the web
#  server automatically creates an ngrok tunnel on startup (using the
#  built-in ngrok-tunnel.js). The tunnel URL is auto-registered in the
#  database and served to Android phones via /api/config.
#
#  Build context must be the monorepo root (srmc-platform/).
#  Reads environment from .env at the project root (single source of truth).
#  Usage (run from srmc-platform/ root):
#    cp .env.example .env
#    docker compose -f apps/web/docker-compose.internet.yml --env-file .env up -d --build
#
#  Find your public URL in the logs:
#    docker logs srmc-web --tail 10
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  # Entry point for all local traffic. Serves static files directly, proxies
  # API / WebSocket to Express. For internet access, the web server
  # creates its own ngrok tunnel directly to port 3001.
  srmc-nginx:
    image: nginx:alpine
    container_name: srmc-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - srmc-web
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── Main web server ──────────────────────────────────────────────────────
  # Starts its own ngrok tunnel on boot if NGROK_AUTHTOKEN is set.
  # The tunnel URL is registered in the DB and served to Android phones
  # via /api/config — no need to set NGROK_URL manually.
  srmc-web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: srmc-web
    restart: unless-stopped
    expose:
      - "${PORT:-3001}"
    volumes:
      - srmc-web-data:/data
    environment:
      - PORT=${PORT:-3001}
      - SRMC_DATA_DIR=/data
      - ADMIN_USERNAME=${ADMIN_USERNAME:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
      - NGROK_DOMAIN=${NGROK_DOMAIN:-}
      - NGROK_URL=${NGROK_URL:-}
      - CENTRAL_SERVER_URL=${CENTRAL_SERVER_URL:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PORT:-3001}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  srmc-web-data:
    name: srmc-web-data
