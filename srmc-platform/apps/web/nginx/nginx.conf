# ─────────────────────────────────────────────────────────────────────────────
#  SRMC Platform — Nginx Reverse Proxy
#
#  Architecture:  ngrok → nginx → Express (port 3001)
#
#  Why nginx?
#    - Proper proxy headers (X-Forwarded-For, X-Real-IP) so Express sees
#      the real client IP instead of ngrok's local proxy IP
#    - WebSocket proxy support for real-time features
#    - Better connection handling (timeouts, buffering) for ngrok tunnels
#    - A clean layer to add rate limiting, caching, or SSL later
#
#  Usage:
#    Docker:  docker compose -f apps/web/docker-compose.yml up -d
#    Local:   nginx -c path/to/this/file
#    Then:    ngrok http 8080
# ─────────────────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log main;
    error_log   /var/log/nginx/error.log warn;

    # ── Performance ────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    client_max_body_size 10m;

    # ── Upstream: Express backend ──────────────────────────────────────────
    # For Docker compose:  server srmc-web:3001;  (resolved via Docker DNS)
    # For local use:       server 127.0.0.1:3001; (use nginx.local.conf instead)
    upstream express {
        server srmc-web:3001;
    }

    # ── Server ─────────────────────────────────────────────────────────────
    server {
        # Listen on port 80 inside the container.
        # Maps to ${NGINX_PORT:-8080} on the host via docker-compose.
        listen 80;

        # ── Headers forwarded to Express ───────────────────────────────────
        proxy_set_header Host                   $host;
        proxy_set_header X-Real-IP              $remote_addr;
        proxy_set_header X-Forwarded-For        $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto      $scheme;
        proxy_set_header X-Forwarded-Host       $host;
        proxy_set_header X-Forwarded-Port       $server_port;

        # ── WebSocket support ──────────────────────────────────────────────
        proxy_http_version 1.1;
        proxy_set_header Upgrade                $http_upgrade;
        proxy_set_header Connection             $http_upgrade;

        # ── Timeouts & buffering ───────────────────────────────────────────
        proxy_connect_timeout                   60s;
        proxy_read_timeout                      180s;
        proxy_send_timeout                      180s;
        proxy_buffering                         off;
        proxy_request_buffering                 off;

        # ── Location: Serve built React app (static files) ─────────────────
        # Nginx serves the pre-built static assets directly — much faster than
        # having Express serve them. Falls back to proxy for non-static paths.
        #
        # For Docker compose: root is /app/packages/client/dist
        # For local: point this to your local packages/client/dist path
        root /app/packages/client/dist;

        # Try static files first, then API/WS, then SPA fallback
        location / {
            try_files $uri $uri/ @express;
        }

        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── Location: API proxy to Express ─────────────────────────────────
        location /api/ {
            proxy_pass http://express;
        }

        # ── Location: WebSocket proxy ──────────────────────────────────────
        location /ws {
            proxy_pass http://express;
            proxy_read_timeout 86400s;  # Long timeout for persistent WS connections
        }

        # ── Location: Health check ─────────────────────────────────────────
        location = /health {
            access_log off;
            proxy_pass http://express;
        }

        # ── Fallback: SPA mode + proxy ─────────────────────────────────────
        # If the file isn't found on disk, send the request to Express.
        # This handles both API routes not caught by /api/ and the SPA shell.
        location @express {
            proxy_pass http://express;
        }
    }
}
