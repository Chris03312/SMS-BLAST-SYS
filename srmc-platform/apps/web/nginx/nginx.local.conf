# ─────────────────────────────────────────────────────────────────────────────
#  SRMC Platform — Nginx Reverse Proxy (Local Use)
#
#  Architecture:  ngrok → nginx → Express (127.0.0.1:3001)
#
#  Use this file when running nginx directly on your machine (not via Docker).
#    nginx -c /path/to/nginx.local.conf
#    ngrok http 8080
#
#  For Docker compose, use nginx.conf instead (upstream: srmc-web:3001).
# ─────────────────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log main;
    error_log   /var/log/nginx/error.log warn;

    # ── Performance ────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    client_max_body_size 10m;

    # ── Upstream: Express backend running locally ──────────────────────────
    upstream express {
        server 127.0.0.1:3001;
    }

    # ── Server ─────────────────────────────────────────────────────────────
    server {
        # Change to 8080 if port 80 is already in use on your machine
        listen 8080;

        # ── Headers forwarded to Express ───────────────────────────────────
        proxy_set_header Host                   $host;
        proxy_set_header X-Real-IP              $remote_addr;
        proxy_set_header X-Forwarded-For        $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto      $scheme;
        proxy_set_header X-Forwarded-Host       $host;
        proxy_set_header X-Forwarded-Port       $server_port;

        # ── WebSocket support ──────────────────────────────────────────────
        proxy_http_version 1.1;
        proxy_set_header Upgrade                $http_upgrade;
        proxy_set_header Connection             $http_upgrade;

        # ── Timeouts & buffering ───────────────────────────────────────────
        proxy_connect_timeout                   60s;
        proxy_read_timeout                      180s;
        proxy_send_timeout                      180s;
        proxy_buffering                         off;
        proxy_request_buffering                 off;

        # ── Location: Serve built React app (static files) ─────────────────
        # Point root to your local client/dist directory
        root /app/packages/client/dist;

        # Try static files first, then API/WS, then SPA fallback
        location / {
            try_files $uri $uri/ @express;
        }

        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri @express;
        }

        # ── Location: API proxy to Express ─────────────────────────────────
        location /api/ {
            proxy_pass http://express;
        }

        # ── Location: WebSocket proxy ──────────────────────────────────────
        location /ws {
            proxy_pass http://express;
            proxy_read_timeout 86400s;
        }

        # ── Location: Health check ─────────────────────────────────────────
        location = /health {
            access_log off;
            proxy_pass http://express;
        }

        # ── Fallback: proxy to Express ─────────────────────────────────────
        location @express {
            proxy_pass http://express;
        }
    }
}
